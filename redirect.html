<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>

  <script>

    // ============================================
    // GET PRODUCT ID FROM URL
    // Example:
    // redirect.html?v=175g
    // ============================================

    const productId = new URLSearchParams(window.location.search).get("v");


    // ============================================
    // REDIRECT LIST
    // ADD FUTURE REDIRECTS HERE
    // ============================================

    const redirectMap = {

      // CURRENT REDIRECTS

      "175g": "https://buzzinbeats.com/ballu/pro-level-repairs-made-easy",

      "168t": "https://buzzinbeats.com/ballu/elevate-your-work-save-your-back",


      // ========================================
      // FUTURE REDIRECTS
      // ADD MORE BELOW
      // ========================================

      // "abc123": "https://yourwebsite.com/page",

      // "new999": "https://buzzinbeats.com/new-page",

    };


    // ============================================
    // AUTO REDIRECT
    // ============================================

    if (productId && redirectMap[productId]) {

      window.location.replace(redirectMap[productId]);

    } else {

      // OPTIONAL FALLBACK
      // If no redirect exists

      document.body.innerHTML = "";

    }

  </script>

</head>

<body>
</body>
</html>
